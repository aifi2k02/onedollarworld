name: Nightly rebuild & deploy
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}
concurrency:
  group: deploy
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        working-directory: web
        run: npm ci
      - name: Build (fetches live Supabase data)
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ssovcsdjbbvvxznejxdy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_wKTCLRnzf_9saPdwZCgXBg_Q_nRen1R
          NEXT_PUBLIC_SITE_URL: https://onedollarworld.xyz
        run: npm run build
      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e5c667b5e2412fbbccee9124c2610843
        run: npx wrangler@latest pages deploy out --project-name onedollarworld --branch main --commit-dirty=true
